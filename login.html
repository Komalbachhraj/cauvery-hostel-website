<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  background:#0b0f19;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  margin-top:10px;
  cursor:pointer;
}

a{ color:#38bdf8; display:block; margin-top:10px; }
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html">Create Account</a>

<p id="msg"></p>
</div>

<script>
function login(){
 let u=user.value;
 let p=pass.value;

 if(u===localStorage.getItem('user') && p===localStorage.getItem('pass')){
  localStorage.setItem('loggedIn',true);
  location.href='leave.html';
 } else {
  msg.innerText="Invalid Credentials";
 }
}
</script>

</body>
</html>
